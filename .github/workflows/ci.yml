name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    env:
      # The committed .sqlx cache lets the query macros typecheck without a database.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets --locked

  lint:
    name: lint
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      # keydates_worker's outstanding-ledger logic has a dependency-free, sub-second
      # test; run it here so a regression fails a branch-protected check.
      - run: python3 keydates-worker/test_ledger.py
      # source-liveness tests (unittest-style; test_ledger stays script-style)
      - run: python3 -m unittest discover -s keydates-worker -p test_keydates_worker.py -v
      # deploy.sh drives production swaps; its harness runs it against a fake
      # root with stubbed systemd/network (see scripts/test_deploy.sh).
      - run: shellcheck scripts/deploy.sh scripts/test_deploy.sh
      - run: bash scripts/test_deploy.sh

  sqlx-check:
    name: sqlx cache up to date
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Apply the schema so the offline query cache can be validated against a real DB.
      - run: psql "$DATABASE_URL" -f schema.sql
      - run: cargo install sqlx-cli --no-default-features --features postgres,rustls --locked
      # Fails if the committed .sqlx cache has drifted from the queries in the code.
      - run: cargo sqlx prepare --check
