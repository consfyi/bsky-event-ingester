name: release

# Builds the deployable artifact set (ingester binary + keydates worker script +
# checksums) and publishes it as a GitHub Release on every push to main. The
# droplet-side updater (scripts/deploy.sh) consumes these releases, so the box
# never has to compile. Deploys stay operator-triggered: publishing a release
# changes nothing on the host.
#
# On pull requests that touch this workflow or the deploy scripts, the build and
# staging steps run (and the artifact set is uploaded as a workflow artifact) but
# no release is published.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - .github/workflows/release.yml
      - scripts/deploy.sh
  workflow_dispatch:

permissions:
  contents: write

# One release build at a time so two quick merges can't race on the "latest"
# release marker.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  release:
    name: build and publish deploy artifact
    # Pinned (not ubuntu-latest): the binary is dynamically linked, so the build
    # image's glibc/openssl must not silently move ahead of what the droplet
    # ships. 24.04's glibc 2.39 / libssl.so.3 are forward-compatible with the
    # current host.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --bin bsky-event-ingester
      - name: Stage artifact set
        run: |
          mkdir stage
          cp target/release/bsky-event-ingester stage/
          cp keydates-worker/keydates_worker.py stage/
          cd stage
          sha256sum bsky-event-ingester keydates_worker.py > SHA256SUMS
      - name: Upload artifact set (pull request proof, no release)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifacts
          path: stage/
      - name: Publish release
        # Only real main builds become releases; a workflow_dispatch on any
        # other ref (possible once this file is on the default branch) must not
        # publish a branch build as "latest".
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="deploy-${{ github.run_number }}.${{ github.run_attempt }}-${GITHUB_SHA::7}"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --latest \
            --title "Deploy build ${GITHUB_SHA::7}" \
            --notes "Automated deploy artifact for ${GITHUB_SHA}.
          Install with \`scripts/deploy.sh ingester\` on the host (see the script header).
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            stage/bsky-event-ingester \
            stage/keydates_worker.py \
            stage/SHA256SUMS
